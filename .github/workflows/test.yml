name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: irongate_qa
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chrome chromium --with-deps

      - name: Setup database
        env:
          MYSQL_PWD: testpassword
        run: |
          mysql -h 127.0.0.1 -u root irongate_qa < schema_updated.sql
          mysql -h 127.0.0.1 -u root irongate_qa < local_seed_data.sql
          mysql -h 127.0.0.1 -u root irongate_qa < local_users.sql
          mysql -h 127.0.0.1 -u root irongate_qa < seed_teams_with_metrics.sql

      - name: Create .env file
        run: |
          cat > .env << EOF
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=testpassword
          DB_NAME=irongate_qa
          PORT=3000
          NODE_ENV=test
          FRONTEND_URL=http://localhost:5173
          secrettoken=test-jwt-secret-key
          EOF

      - name: Run database tests
        run: npm run test:db

      - name: Start backend
        run: |
          nohup npm run server:prod > backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend starting with PID: $BACKEND_PID"
          sleep 10
          
          # Verify process is still running
          if ps -p $BACKEND_PID > /dev/null; then
            echo "✅ Backend process is running"
          else
            echo "❌ Backend process died"
            cat backend.log
            exit 1
          fi
          
      - name: Start frontend
        run: |
          npm run dev > frontend.log 2>&1 &
          echo "Frontend starting..."
          echo "Frontend PID: $!"
          sleep 10
          
      - name: Check processes
        run: |
          echo "Checking running processes..."
          ps aux | grep -E "(tsx|vite|node)" | grep -v grep || echo "No processes found"
          echo "Checking ports..."
          netstat -tuln | grep -E "(3000|5173)" || echo "Ports not listening yet"
          
      - name: Wait for backend to be ready
        run: |
          echo "Checking backend port..."
          for i in {1..30}; do
            if nc -z localhost 3000 2>/dev/null; then
              echo "✅ Backend port 3000 is listening!"
              sleep 2
              break
            fi
            echo "Attempt $i/30: Port 3000 not ready..."
            sleep 2
          done
          
          # Test actual login to ensure backend is responding
          echo "Testing backend login..."
          response=$(curl -s -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@irongate.com","password":"demo123"}')
          
          if echo "$response" | grep -q "token"; then
            echo "✅ Backend login successful!"
            exit 0
          else
            echo "❌ Backend login failed!"
            echo "Response: $response"
            echo "=== Backend Logs ==="
            cat backend.log 2>/dev/null || echo "No backend log"
            exit 1
          fi
          
      - name: Check frontend (optional)
        run: |
          echo "Checking frontend..."
          curl -f http://localhost:5173 > /dev/null 2>&1 && echo "✅ Frontend is ready!" || echo "⚠️ Frontend check failed (may be ok)"
        continue-on-error: true

      - name: Run API tests
        run: npm run test:api
        timeout-minutes: 5

      - name: Run E2E tests (simple suite for CI)
        run: npx playwright test simple-test.spec.ts --project=chromium
        timeout-minutes: 10
        
      - name: Run SPA E2E suite (optional, can fail)
        run: npx playwright test auth-spa.spec.ts --project=chromium --max-failures=5
        continue-on-error: true
        timeout-minutes: 15

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
            coverage/
            backend.log
            frontend.log

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Test Results\n\n';
            
            try {
              const results = fs.readFileSync('test-results/results.json', 'utf8');
              const data = JSON.parse(results);
              comment += `✅ Passed: ${data.passed}\n`;
              comment += `❌ Failed: ${data.failed}\n`;
              comment += `⏭️ Skipped: ${data.skipped}\n`;
            } catch (e) {
              comment += 'Test results not available\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
